name: Automatic pull request review

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, edited, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review_pull_request:
    name: Pull request review by Danger
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    # - name: Setup Mint
    #   uses: irgaly/setup-mint@8566ee44b3a79d20642d1924db21c8ab0402859f # irgaly/setup-mint@v1

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # actions/cache@v5.0.4
      id: bundlerCache
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-gems-

    - name: Setup CI environment
      uses: ./.github/actions/setup-ci-environment
      with:
        bundler-cache: "false"
        bundle-install-command: "bundle install --path vendor/bundle"

    - name: Setup ENV file
      env:
        ENV: ${{ secrets.ENV }}
      run: |
        touch .env
        echo $ENV | base64 --decode > .env

    - name: Run Arkana
      run: bundle exec arkana
    
    - name: Modify test plan
      run: mint run mikeger/XcodeSelectiveTesting@0.14.2 iOSTemplate.xcodeproj --test-plan iOSTemplate.xctestplan --base-branch origin/${{ github.base_ref }}

    - name: Build and Test
      run: bundle exec fastlane buildAndTest
      env:
        CI: true

    - name: Clean up previous code coverage report
      run: bundle exec fastlane cleanUpOutput

    # - name: Review pull request by Danger
    #   env:
    #     DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    #   run: bundle exec danger
