name: Deploy Dev Build To Firebase

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build and Deploy to Firebase
        uses: ./.github/actions/build-and-deploy-firebase
        with:
          environment: Dev
          build_and_test_lane: buildAndTestDev
          code_signing_lane: syncAdHocDevCodeSigning
          build_and_upload_lane: buildDevAndUploadToFirebase
          tag_type: Dev_Firebase
          create_release_note: 'true'
          install_firebase_tools: 'true'
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          match_password: ${{ secrets.MATCH_PASSWORD }}
          firebase_credentials_base64: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
          env_file: ${{ secrets.ENV_FILE }}
