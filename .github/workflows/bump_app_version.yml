name: Bump App Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version (e.g. 1.0.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump_app_version:
    name: Bump App Version
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate version input
        run: |
          if ! [[ "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must follow semantic versioning (e.g., 1.2.3)"
            exit 1
          fi

      - name: Create bump version branch
        uses: peterjgrainger/action-create-branch@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: chore/bump-app-version-to-${{ github.event.inputs.version }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: chore/bump-app-version-to-${{ github.event.inputs.version }}

      - name: Bundle install
        run: bundle install

      - name: Bump app version
        run: bundle exec fastlane bumpAppVersionLane
        env:
          MANUAL_VERSION: ${{ github.event.inputs.version }}

      - name: Set up Git
        run: |
          git config --global user.name 'Github Actions'
          git config --global user.email 'github-actions@users.noreply.github.com'

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "[Chore] Bump app version to ${{ github.event.inputs.version }}"
          git push origin HEAD

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          cat <<EOF > body.md
          ## What happened 👀

          Bump app version to ${VERSION}.

          ## Insight 📝

          This PR is auto-generated by the **Bump App Version** GitHub Actions workflow.
          The version is updated via the \`bumpAppVersionLane\` Fastlane lane.

          ## Proof Of Work 📹

          N/A — automated version bump.
          EOF
          gh pr create \
            --draft \
            --base develop \
            --head "chore/bump-app-version-to-${VERSION}" \
            --title "[Chore] Bump app version to ${VERSION}" \
            --body-file body.md
